<header class="header--landing">
    <div class="container">
        <div class="header-content">
            <a href="/" class="header-content__logo">
                <span class="logo">
                    <img src="{{ url_for('static', path='/img/logo.svg') }}" alt="ЮНАЙТ" class="logo__img">
                </span>
                <span class="logo-text">ЮНАЙТ</span>
            </a>
            
            <nav class="header-content__menu">
                <div class="menu-item"><a href="#about">О школе</a></div>
                <div class="menu-item"><a href="#programs">Программы</a></div>
                <div class="menu-item"><a href="#reviews">Отзывы</a></div>
                <div class="menu-item"><a href="#prices">Цены</a></div>
                <div class="menu-item"><a href="#contacts">Контакты</a></div>
            </nav>
            
            
              <div class="header-content__contacts">
                <!--
                    ССЫЛКА С НОМЕРОМ ТЕЛЕФОНА
                    CSS скроет текст "+7 (999) 123-45-67" и нарисует иконку.
                -->
                <a href="tel:+79991234567" class="phone-number" aria-label="Позвонить нам">
                    +7 (999) 123-45-67
                </a>
                <!--
                    КНОПКА "ЗАКАЗАТЬ ЗВОНОК"
                    CSS применит к ней фирменный градиент.
                -->
                <a href="#callback" class="mc_button" onclick="openPopup('callback'); return false;">
                    Заказать звонок
                </a>
            </div>

            <!-- Burger Menu Button -->
            <button class="burger-btn" aria-label="Меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>
</header>
