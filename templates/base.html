<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    
    <title>{% block title %}{{ title }}{% endblock %}</title>
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/original_styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/sections.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/fix-sections.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="mc_middle">
    {% include 'partials/header.html' %}
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    {% include 'partials/footer.html' %}
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="{{ url_for('static', path='/js/main.js') }}" defer></script>
    
    <script>
        // Debug: check if JS is loading
        console.log('Base template script loaded');
        window.addEventListener('load', function() {
            console.log('Window loaded completely');
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
