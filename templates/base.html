<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    
    <title>{% block title %}{{ title }}{% endblock %}</title>
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"> 
    
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- 
        CSS STRUCTURE (Порядок загрузки важен!):
        ========================================
        1. COMMON - Глобальные стили (переменные, типографика, анимации, утилиты)
        2. DESIGN-SYSTEM - Дизайн-система
        3. HEADER - Стили шапки
        4. BURGER-MENU - Мобильное меню
        5. COMPONENTS - Переиспользуемые компоненты (модалки, аккордеоны)
        6. SECTIONS - Стили конкретных секций (hero, subjects, benefits...)
        7. RESPONSIVE - Адаптивность (загружать последней)
    -->
    
    <!-- 1. COMMON - Глобальные стили (обязательно первым!) -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/design-system.css') }}">
    
    <!-- 2. HEADER - Шапка сайта -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/burger-menu.css') }}">
    
    <!-- 3. COMPONENTS - Переиспользуемые компоненты -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/components.css') }}">
    
    <!-- 4. SECTIONS - Стили секций -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/sections.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/hero-section.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/subjects-section.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/benefits-section.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/author-section.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/info-section.css') }}">
      <link rel="stylesheet" href="{{ url_for('static', path='/css/reviews-section.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/packages-section.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/consultation-section.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/faq-section.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/section-license.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/final_cta.css') }}">
    <link rel="stylesheet" href = "{{ url_for('static', path='/css/free_lesson_form.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/footer.css') }}">

    <!-- 5. RESPONSIVE - Адаптивность (загружать последней) -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/calendar-section.css') }}">

    
    {% block extra_css %}{% endblock %}
</head>
<body class="mc_middle">
    {% include 'partials/header.html' %}
    
    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}
    <!-- Scripts -->
   
    <script src="{{ url_for('static', path='/js/animations-gsap.js') }}"></script>
    <script src="{{ url_for('static', path='/js/main.js') }}" defer></script>
    <script src="{{ url_for('static', path='/js/form.js') }}" defer></script>
    <script>
        console.log('Base template script loaded');
        window.addEventListener('load', function() {
            console.log('Window loaded completely');
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
